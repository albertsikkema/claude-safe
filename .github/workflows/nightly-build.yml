name: Nightly image build

# Builds claude-code-safe nightly and on demand. Multi-arch (amd64+arm64).
# Each arch builds in parallel on its native runner under a per-arch tag
# (`:latest-amd64`, `:latest-arm64`). A manifest job then stitches those
# tagged children into the multi-arch `:latest` and `:<date>` tags.
#
# Why per-arch *tags* instead of pushing by-digest only: GHCR garbage-
# collects untagged manifests, which would leave the multi-arch list
# pointing to children that no longer exist. Tagging the per-arch images
# keeps them reachable as long as the tag exists.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: nightly-build
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/claude-code-safe

jobs:
  build-per-arch:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch tag
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          no-cache: true
          pull: true
          provenance: false
          tags: ${{ env.IMAGE }}:latest-${{ matrix.arch }}

  publish-manifest:
    needs: build-per-arch
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      date: ${{ steps.meta.outputs.date }}
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute date tag
        id: meta
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Assemble and tag multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ steps.meta.outputs.date }}" \
            "${IMAGE}:latest-amd64" \
            "${IMAGE}:latest-arm64"

      - name: Verify published manifest
        run: docker buildx imagetools inspect "${IMAGE}:latest"

  smoke-test:
    needs: publish-manifest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image arch matches runner
        run: |
          docker pull "${IMAGE}:latest"
          got="$(docker image inspect "${IMAGE}:latest" --format '{{.Architecture}}')"
          echo "expected=${{ matrix.arch }} got=${got}"
          test "${got}" = "${{ matrix.arch }}"

      - name: Verify embedded tools
        run: |
          docker run --rm "${IMAGE}:latest" zsh -c '
            set -euo pipefail
            claude --version
            gh --version
            az --version
            go version
            uv --version
            ruff --version
            pip-audit --version
            node --version
            python3 --version
            git --version
          '
